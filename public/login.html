<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | RealScoreAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="single-col">
      <section class="panel form-panel">
        <h1>Login</h1>
        <form id="login-form">
          <label>Email <input name="email" type="email" required /></label>
          <label>Password <input name="password" type="password" required /></label>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <div class="hero-actions">
          <a class="btn btn-secondary" href="forgot-password.html">Forgot password?</a>
          <a class="btn btn-secondary" href="signup.html">Create account</a>
        </div>
        <p class="meta" id="auth-message"></p>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
