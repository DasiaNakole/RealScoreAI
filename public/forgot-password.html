<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | RealScoreAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="single-col">
      <section class="panel form-panel">
        <h1>Forgot password</h1>
        <p class="meta">Enter your email to receive a password reset link.</p>
        <form id="forgot-form">
          <label>Email <input name="email" type="email" required /></label>
          <button class="btn btn-primary" type="submit">Send reset link</button>
        </form>
        <div class="hero-actions">
          <a class="btn btn-secondary" href="login.html">Back to login</a>
        </div>
        <p class="meta" id="forgot-message"></p>
      </section>
    </main>
    <script src="theme.js"></script>
    <script src="forgot-password.js"></script>
  </body>
</html>
