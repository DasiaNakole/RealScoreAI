<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal | RealScoreAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="single-col">
      <section class="panel form-panel">
        <p class="badge">RealScoreAI Portal</p>
        <h1 id="portal-title">Welcome</h1>
        <p class="meta" id="portal-subtitle">Choose where you want to work.</p>
        <div class="cards-grid portal-grid">
          <article class="panel">
            <h2>Lead Dashboard</h2>
            <p class="meta">Top 5, at-risk leads, and score explanations.</p>
            <a class="btn btn-primary" href="app.html">Open Dashboard</a>
          </article>
          <article class="panel" id="admin-card" style="display: none;">
            <h2>Admin Console</h2>
            <p class="meta">Invites, templates, exports, and email checks.</p>
            <a class="btn btn-secondary" href="admin.html">Open Admin</a>
          </article>
          <article class="panel">
            <h2>Billing</h2>
            <p class="meta">Start trial, update plan, and manage access.</p>
            <a class="btn btn-secondary" href="payment.html">Open Billing</a>
          </article>
        </div>
        <div class="hero-actions">
          <button id="logout-button" class="btn btn-secondary" type="button">Logout</button>
        </div>
      </section>
    </main>
    <script src="theme.js"></script>
    <script src="portal.js"></script>
  </body>
</html>
